<div class="mod-memory-container">
  <div class="mod-memory-controls">
    <button class="mod-memory-btn mod-memory-btn-undo" id="mod-memory-undo-btn">
      <span>❌</span> <span data-i18n="modules.memoryHelper.undo">Undo</span>
    </button>
    <button class="mod-memory-btn mod-memory-btn-clear" id="mod-memory-clear-btn">
      <span>🗑️</span> <span data-i18n="modules.memoryHelper.clear">Clear</span>
    </button>
    <button class="mod-memory-btn mod-memory-btn-fullscreen" id="mod-memory-fullscreen-btn">
      <span>⛶</span> <span data-i18n="modules.memoryHelper.fullscreen">Fullscreen</span>
    </button>
  </div>

  <div class="mod-memory-grid" id="mod-memory-grid"></div>

  <div class="mod-memory-instructions">
    <strong data-i18n="modules.memoryHelper.instructions">Instructions</strong><br>
    <span data-i18n="modules.memoryHelper.instructionStep1">1. Each cell shows the 12 Digimon in miniature.</span><br>
    <span data-i18n="modules.memoryHelper.instructionStep2">2. Click a Digimon to assign it to the cell.</span><br>
    <span data-i18n="modules.memoryHelper.instructionStep3">3. Click the large image to deselect.</span><br>
    <span data-i18n="modules.memoryHelper.instructionStep4">4. "Undo" removes the last assignment.</span><br>
    <span data-i18n="modules.memoryHelper.instructionStep5">5. "Clear" resets the entire board.</span>
  </div>
</div>
